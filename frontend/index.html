<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-3">Iniciar sesión</h3>

        <div id="alertLogin"></div>

        <form id="loginForm">
            <input class="form-control mb-2" type="email" id="email" placeholder="Email" required>
            <input class="form-control mb-3" type="password" id="password" placeholder="Contraseña" required>
            <button class="btn btn-primary w-100">Entrar</button>
        </form>

        <p class="text-center mt-3">
            ¿No tienes cuenta? <a href="register.html">Regístrate</a>
        </p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
