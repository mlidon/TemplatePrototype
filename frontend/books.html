<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mis Libros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-3">
        <span class="navbar-brand">Mi Biblioteca</span>
        <button class="btn btn-outline-light" onclick="logout()">Cerrar sesión</button>
    </nav>

    <div class="container mt-4">

        <div class="card p-3 shadow-sm mb-4">
            <h4>Nuevo libro</h4>
            <form id="bookForm">
                <div class="row">
                    <div class="col-md-6">
                        <input class="form-control mb-2" id="title" placeholder="Título" required>
                    </div>
                    <div class="col-md-6">
                        <input class="form-control mb-2" id="author" placeholder="Autor" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <input class="form-control mb-2" id="year" type="number" placeholder="Año" required>
                    </div>
                    <div class="col-md-8">
                        <input class="form-control mb-2" id="image_url" placeholder="URL de la portada">
                    </div>
                </div>

                <button class="btn btn-primary w-100">Crear libro</button>
            </form>
        </div>

        <h4>Mis libros</h4>
        <div id="booksList" class="row g-3"></div>

    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar libro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="edit_id">

                        <input class="form-control mb-2" id="edit_title" placeholder="Título" required>
                        <input class="form-control mb-2" id="edit_author" placeholder="Autor" required>
                        <input class="form-control mb-2" id="edit_year" type="number" placeholder="Año" required>
                        <input class="form-control mb-2" id="edit_image_url" placeholder="URL de la portada">
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-primary" onclick="updateBook()">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
