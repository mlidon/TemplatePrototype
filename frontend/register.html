<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width: 350px;">
        <h3 class="text-center mb-3">Crear cuenta</h3>

        <div id="alertRegister"></div>

        <form id="registerForm">
            <input class="form-control mb-2" type="text" id="username" placeholder="Usuario" required>
            <input class="form-control mb-2" type="email" id="email" placeholder="Email" required>
            <input class="form-control mb-3" type="password" id="password" placeholder="Contraseña" required>
            <button class="btn btn-success w-100">Registrar</button>
        </form>

        <p class="text-center mt-3">
            ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
        </p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
